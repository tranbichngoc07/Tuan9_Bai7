name: Automated Code Review

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write # Quan trọng: Cho phép Bot ghi comment vào PR
  checks: write

jobs:
  review:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Checkstyle and Review
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: warning # Hoặc 'error' tùy nhu cầu